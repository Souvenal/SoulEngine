[Window]
ResolutionX = 1920
ResolutionY = 1080

[Render]
RHI = "Vulkan"
FramesInFlight = 2

[Log]
ConsoleLevel = "Info"
FileLevel    = "Debug"

[Application]
Name = "Test"

[Shader]
# Emit SPIR-V debug info (OpLine/OpString) for RenderDoc support.
# When omitted: debug builds default to true, release to false.
DebugInfo = true

[RHI.Vulkan]
# Bindless texture descriptor array size.  When omitted the Vulkan backend
# defaults to 4096.
MaxTextures = 4096

# Per-frame global constant (uniform) buffer size in bytes.
# Written each frame by WriteGlobalConstantBuffer().  Shader-visible via
# Set 0 Binding 0.  When omitted the backend defaults to 256 bytes —
# enough for a 4x4 projection matrix + view matrix + time vector4.
GlobalConstantBufferSize = 256
